<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <title>Search Test</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    input { width: 100%; padding: 10px 14px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; outline: none; box-sizing: border-box; }
    input:focus { border-color: #555; }
    #status { font-size: 13px; color: #888; margin: 8px 0 16px; min-height: 18px; }
    .item { padding: 10px 0; border-bottom: 1px solid #eee; }
    .item .name { font-weight: bold; }
    .item .meta { font-size: 13px; color: #666; }
    .empty { color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <input id="q" type="text" placeholder="ค้นหาหนังสือ..." autocomplete="off"/>
  <div id="status"></div>
  <div id="results"></div>

  <script>
    let timer = null;
    const q       = document.getElementById('q');
    const status  = document.getElementById('status');
    const results = document.getElementById('results');

    q.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(search, 350);
    });

    q.addEventListener('keydown', e => { if (e.key === 'Enter') { clearTimeout(timer); search(); } });

    async function search() {
      const query = q.value.trim();
      if (!query) { status.textContent = ''; results.innerHTML = ''; return; }

      status.textContent = 'กำลังค้นหา...';
      const t = performance.now();

      try {
        const res  = await fetch(`/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const ms   = Math.round(performance.now() - t);

        status.textContent = `${data.length} รายการ (${ms}ms)`;
        results.innerHTML = data.length
          ? data.map(b => `
              <div class="item">
                <div class="name">${b.name ?? '-'}</div>
                <div class="meta">${[b.author, b.publisher].filter(Boolean).join(' · ')}</div>
              </div>`).join('')
          : '<div class="empty">ไม่พบผลลัพธ์</div>';
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
